<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Lectura a Primera Vista (Audio Real)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #1a202c;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .at-viewport {
             border-radius: 0.5rem;
        }
        button {
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto p-4 md:p-8">
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800">Lector de Partituras con Sonido Real</h1>
            <p class="text-gray-600 mt-2">Genera 4 compases de notas aleatorias y escúchalas.</p>
        </header>

        <div id="alpha-tab-container"></div>

        <footer class="mt-8 flex flex-wrap justify-center items-center gap-6">
            <button id="generate-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md">
                Generar Partitura
            </button>
            <button id="play-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md">
                Reproducir
            </button>
            <div class="flex items-center gap-2 text-gray-700">
                <label for="bpm-slider" class="font-medium">BPM:</label>
                <input id="bpm-slider" type="range" min="40" max="220" value="120" class="w-32 cursor-pointer">
                <span id="bpm-value" class="font-bold text-lg w-10 text-left">120</span>
            </div>
        </footer>
    </div>

    <!-- Librería para visuales -->
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.js"></script>
    
    <script>
        window.addEventListener('load', () => {
            // --- VERIFICACIÓN ROBUSTA DE LA LIBRERÍA ---
            if (typeof alphaTab === 'undefined') {
                const container = document.querySelector('#alpha-tab-container');
                container.innerText = "Error: La librería alphaTab no se pudo cargar. Revisa tu conexión o el bloqueador de scripts.";
                console.error("El objeto alphaTab no está definido. La librería no se cargó.");
                return; // Detener la ejecución si la librería no está
            }

            const container = document.querySelector('#alpha-tab-container');
            const generateBtn = document.getElementById('generate-btn');
            const playBtn = document.getElementById('play-btn');
            const bpmSlider = document.getElementById('bpm-slider');
            const bpmValue = document.getElementById('bpm-value');
            
            const notePool = [
                'B0', 'C1', 'C#1', 'D1', 'D#1', 'E1', 'F1', 'F#1', 'G1', 'G#1', 'A1', 'A#1', 'B1',
                'C2', 'C#2', 'D2', 'D#2', 'E2', 'F2', 'F#2', 'G2', 'G#2', 'A2', 'A#2', 'B2',
                'C3', 'C#3', 'D3', 'D#3', 'E3'
            ];
            let api = null;
            let currentNotes = [];
            let bpm = 120;

            let isPlaying = false;
            let scheduledTimeouts = [];
            let activeSounds = [];

            try {
                api = new alphaTab.AlphaTabApi(container, { core: { tex: true } });
            } catch (e) {
                console.error("Error al inicializar alphaTab:", e);
                container.innerText = "Hubo un error al inicializar el renderizador de partituras.";
                return;
            }

            function stopAllSounds() {
                isPlaying = false;
                playBtn.innerText = 'Reproducir';
                activeSounds.forEach(sound => {
                    sound.pause();
                    sound.currentTime = 0;
                });
                activeSounds = [];
                scheduledTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
                scheduledTimeouts = [];
            }

            function playNotes() {
                if (currentNotes.length === 0) return;

                stopAllSounds();
                isPlaying = true;
                playBtn.innerText = 'Detener';
                const delayBetweenNotes = (60 / bpm) * 1000;

                currentNotes.forEach((noteName, index) => {
                    const timeoutId = setTimeout(() => {
                        const noteLetter = noteName.slice(0, -1);
                        const writtenOctave = parseInt(noteName.slice(-1), 10);
                        const soundOctave = writtenOctave + 1;
                        let soundNoteName = noteLetter + soundOctave;
                        
                        let fileName = soundNoteName.replace('#', 's') + '.mp3';
                        let audioPath = `assets/notas-de-bajo/${fileName}`;

                        const sound = new Audio(audioPath);
                        activeSounds.push(sound);
                        sound.play().catch(e => console.error(`No se pudo reproducir ${audioPath}:`, e));

                        if (index === currentNotes.length - 1) {
                            setTimeout(stopAllSounds, delayBetweenNotes);
                        }
                    }, index * delayBetweenNotes);
                    scheduledTimeouts.push(timeoutId);
                });
            }

            function generateSheetMusic() {
                if (!api) return;
                
                let notesForScore = [];
                currentNotes = [];

                for (let i = 0; i < 16; i++) {
                    const randomNote = notePool[Math.floor(Math.random() * notePool.length)];
                    currentNotes.push(randomNote);
                    notesForScore.push(randomNote + '.4');
                }
                
                let scoreString = notesForScore.slice(0, 4).join(' ') + ' | ' +
                                  notesForScore.slice(4, 8).join(' ') + ' | ' +
                                  notesForScore.slice(8, 12).join(' ') + ' | ' +
                                  notesForScore.slice(12, 16).join(' ');

                const score = `\\clef f4 \\ts 4 4 ${scoreString}`;
                api.tex(score);
            }

            generateBtn.addEventListener('click', () => {
                stopAllSounds();
                generateSheetMusic();
            });

            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    stopAllSounds();
                } else {
                    playNotes();
                }
            });

            bpmSlider.addEventListener('input', (e) => {
                bpm = parseInt(e.target.value, 10);
                bpmValue.innerText = bpm;
                if (isPlaying) {
                    stopAllSounds();
                }
            });

            generateSheetMusic();
        });
    </script>
</body>
</html>
