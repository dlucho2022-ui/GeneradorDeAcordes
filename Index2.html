<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Lectura a Primera Vista con VexFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Se utiliza la versión de VexFlow solicitada -->
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #1a202c;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        #vexflow-output {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        button {
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f9fafb;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto p-4 md:p-8">
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800">Lector de Partituras con VexFlow</h1>
            <p class="text-gray-600 mt-2">Personaliza y genera tu ejercicio de lectura a primera vista.</p>
        </header>

        <div id="vexflow-output"></div>

        <!-- Panel de Controles -->
        <div class="settings-grid">
            <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-blanca" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-blanca" class="font-medium">Blanca</label>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-negra" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-negra" class="font-medium">Negra</label>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-corcheas" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-corcheas" class="font-medium">2 Corcheas</label>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-semicorcheas" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-semicorcheas" class="font-medium">4 Semicorcheas</label>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-silencio-corchea" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-silencio-corchea" class="font-medium">Silencio de Corchea, Corchea</label>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-corchea-silencio" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-corchea-silencio" class="font-medium">Corchea, Silencio de Corchea</label>
            </div>
             <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-corchea-semis" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-corchea-semis" class="font-medium">Corchea, 2 Semicorcheas</label>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="pattern-semis-corchea" class="h-4 w-4 rounded text-blue-600" checked>
                <label for="pattern-semis-corchea" class="font-medium">2 Semicorcheas, Corchea</label>
            </div>
        </div>

        <footer class="mt-8 flex flex-wrap justify-center items-center gap-6">
            <button id="generate-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md">
                Generar Partitura
            </button>
            <button id="play-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md" disabled>
                Cargando...
            </button>
            <div class="flex items-center gap-2 text-gray-700">
                <label for="bpm-slider" class="font-medium">BPM:</label>
                <input id="bpm-slider" type="range" min="40" max="220" value="60" class="w-32 cursor-pointer">
                <span id="bpm-value" class="font-bold text-lg w-10 text-left">60</span>
            </div>
            <div class="flex items-center justify-center gap-2 text-gray-700">
                <input type="checkbox" id="metronome-toggle" class="h-5 w-5 rounded text-blue-600">
                <label for="metronome-toggle" class="font-medium">Metrónomo</label>
            </div>
        </footer>
    </div>
    
    <script>
        let isAppInitialized = false;

        window.addEventListener('load', () => {
            if (isAppInitialized) return;
            isAppInitialized = true;

            if (typeof Vex === 'undefined') {
                document.querySelector('#vexflow-output').innerText = "Error: La librería VexFlow no se pudo cargar.";
                return;
            }

            const { Renderer, Stave, StaveNote, Beam, Formatter, Voice, Accidental } = Vex.Flow;
            const outputDiv = document.getElementById('vexflow-output');
            const generateBtn = document.getElementById('generate-btn');
            const playBtn = document.getElementById('play-btn');
            const bpmSlider = document.getElementById('bpm-slider');
            const bpmValue = document.getElementById('bpm-value');
            const metronomeToggle = document.getElementById('metronome-toggle');
            
            const notePool = [
                'B1', 'C2', 'C#2', 'Db2', 'D2', 'D#2', 'Eb2', 'E2', 'F2', 'F#2', 'Gb2', 'G2', 'G#2', 'Ab2', 'A2', 'A#2', 'Bb2', 'B2',
                'C3', 'C#3', 'Db3', 'D3', 'D#3', 'Eb3', 'E3', 'F3', 'F#3', 'Gb3', 'G3'
            ];
            let currentPlaybackSequence = [];
            let bpm = 60;
            let isMetronomeOn = false;

            let isPlaying = false;
            let scheduledTimeouts = [];
            let currentlyPlayingSound = null;
            
            const audioCache = {};
            const enharmonicMap = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };
            
            const renderer = new Renderer(outputDiv, Renderer.Backends.SVG);
            const context = renderer.getContext();

            function getAudioNoteName(writtenNote) {
                const noteLetter = writtenNote.slice(0, -1);
                const octave = writtenNote.slice(-1);
                return (enharmonicMap[noteLetter] || noteLetter) + octave;
            }

            function preloadSounds() {
                const soundNoteNames = [
                    'B1', 'C2', 'C#2', 'D2', 'D#2', 'E2', 'F2', 'F#2', 'G2', 'G#2', 'A2', 'A#2', 'B2',
                    'C3', 'C#3', 'D3', 'D#3', 'E3', 'F3', 'F#3', 'G3'
                ];
                
                const metronomeFileName = 'metronomo.wav';
                let soundsLoaded = 0;
                const totalSounds = soundNoteNames.length + 1;
                playBtn.innerText = `Cargando 0/${totalSounds}`;

                const onSoundLoad = () => {
                    soundsLoaded++;
                    playBtn.innerText = `Cargando ${soundsLoaded}/${totalSounds}`;
                    if (soundsLoaded === totalSounds) {
                        playBtn.disabled = false;
                        playBtn.innerText = 'Reproducir';
                    }
                };
                
                const metronomeSound = new Audio(`assets/notas-de-bajo/${metronomeFileName}`);
                metronomeSound.addEventListener('canplaythrough', onSoundLoad, { once: true });
                metronomeSound.addEventListener('error', onSoundLoad, { once: true });
                audioCache['metronome'] = metronomeSound;

                soundNoteNames.forEach(noteName => {
                    let fileName = noteName.replace('#', 's').toLowerCase() + '.wav';
                    let audioPath = `assets/notas-de-bajo/${fileName}`;
                    const sound = new Audio(audioPath);
                    sound.addEventListener('canplaythrough', onSoundLoad, { once: true });
                    sound.addEventListener('error', onSoundLoad, { once: true });
                    audioCache[noteName] = sound;
                });
            }

            function stopAllSounds() {
                isPlaying = false;
                playBtn.innerText = 'Reproducir';
                if (currentlyPlayingSound) {
                    currentlyPlayingSound.pause();
                    currentlyPlayingSound.currentTime = 0;
                }
                scheduledTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
                scheduledTimeouts = [];
            }

            function playSequence() {
                if (currentPlaybackSequence.length === 0) return;

                stopAllSounds();
                isPlaying = true;
                playBtn.innerText = 'Detener';
                const quarterNoteDuration = (60 / bpm) * 1000;
                let accumulatedDelay = 0;

                if (isMetronomeOn) {
                    const totalBeats = 4 * 4;
                    for (let i = 0; i < totalBeats; i++) {
                        scheduledTimeouts.push(setTimeout(() => {
                            const metronomeSound = audioCache['metronome'];
                            if (metronomeSound) {
                                metronomeSound.currentTime = 0;
                                metronomeSound.play();
                            }
                        }, i * quarterNoteDuration));
                    }
                }

                currentPlaybackSequence.forEach((item, index) => {
                    scheduledTimeouts.push(setTimeout(() => {
                        if (currentlyPlayingSound) {
                            currentlyPlayingSound.pause();
                            currentlyPlayingSound.currentTime = 0;
                        }
                        
                        if (item.note !== 'rest') {
                            const soundNoteName = getAudioNoteName(item.note);
                            
                            const sound = audioCache[soundNoteName];
                            if (sound) {
                                sound.volume = 1.0;
                                sound.currentTime = 0;
                                currentlyPlayingSound = sound;
                                sound.play().catch(e => console.error(`No se pudo reproducir ${sound.src}:`, e));
                            }
                        }

                        if (index === currentPlaybackSequence.length - 1) {
                            const lastNoteDuration = quarterNoteDuration * (4 / item.duration);
                            scheduledTimeouts.push(setTimeout(stopAllSounds, lastNoteDuration));
                        }
                    }, accumulatedDelay));
                    
                    const noteDuration = quarterNoteDuration * (4 / item.duration);
                    accumulatedDelay += noteDuration;
                });
            }

            function generateSheetMusic() {
                let newPlaybackSequence = [];
                const numMeasures = 4;

                const allPatterns = {
                    blanca: { value: 8, pattern: [{ duration: 'h', isNote: true }] },
                    negra: { value: 4, pattern: [{ duration: 'q', isNote: true }] },
                    corcheas: { value: 4, pattern: [{ duration: '8', isNote: true }, { duration: '8', isNote: true }] },
                    semicorcheas: { value: 4, pattern: [{ duration: '16', isNote: true }, { duration: '16', isNote: true }, { duration: '16', isNote: true }, { duration: '16', isNote: true }] },
                    'silencio-corchea': { value: 4, pattern: [{ duration: '8r', isNote: false }, { duration: '8', isNote: true }] },
                    'corchea-silencio': { value: 4, pattern: [{ duration: '8', isNote: true }, { duration: '8r', isNote: false }] },
                    'corchea-semis': { value: 4, pattern: [{ duration: '8', isNote: true }, { duration: '16', isNote: true }, { duration: '16', isNote: true }] },
                    'semis-corchea': { value: 4, pattern: [{ duration: '16', isNote: true }, { duration: '16', isNote: true }, { duration: '8', isNote: true }] }
                };
                
                let activePatterns = [];
                for (const key in allPatterns) {
                    const checkbox = document.getElementById(`pattern-${key}`);
                    if (checkbox && checkbox.checked) {
                        activePatterns.push(allPatterns[key]);
                    }
                }
                
                if (activePatterns.length === 0) {
                    activePatterns.push(allPatterns.negra); // Failsafe
                }

                let measures = [];
                for (let i = 0; i < numMeasures; i++) {
                    let sixteenthsInMeasure = 0;
                    let measureNotes = [];
                    while (sixteenthsInMeasure < 16) {
                        const sixteenthsLeft = 16 - sixteenthsInMeasure;
                        const possiblePatterns = activePatterns.filter(p => p.value <= sixteenthsLeft);
                        
                        if (possiblePatterns.length === 0) {
                             const restValue = Math.min(sixteenthsLeft, 4);
                             const restDuration = {4: 'qr', 2: '8r', 1: '16r'}[restValue] || '16r';
                             measureNotes.push(new StaveNote({ keys: ['d/3'], duration: restDuration, clef: 'bass' }));
                             newPlaybackSequence.push({ note: 'rest', duration: parseInt(restDuration.replace('r','')) });
                             sixteenthsInMeasure += restValue;
                             continue;
                        }

                        const pattern = possiblePatterns[Math.floor(Math.random() * possiblePatterns.length)];
                        
                        pattern.pattern.forEach(block => {
                            const isRest = !block.isNote;
                            const randomNote = isRest ? 'd/3' : notePool[Math.floor(Math.random() * notePool.length)];
                            
                            const vexNote = new StaveNote({
                                keys: [isRest ? 'd/3' : randomNote.replace(/([A-G])(#|b)?(\d)/, '$1$2/$3').toLowerCase()],
                                duration: block.duration,
                                clef: 'bass',
                                auto_stem: true
                            });

                            if (!isRest) {
                                const noteName = randomNote.slice(0, -1);
                                if (noteName.includes('#')) vexNote.addModifier(new Accidental('#'));
                                if (noteName.includes('b')) vexNote.addModifier(new Accidental('b'));
                                newPlaybackSequence.push({ note: randomNote, duration: parseInt(block.duration.replace('r','').replace('h','2').replace('q','4')) });
                            } else {
                                newPlaybackSequence.push({ note: 'rest', duration: parseInt(block.duration.replace('r','').replace('h','2').replace('q','4')) });
                            }
                            measureNotes.push(vexNote);
                        });
                        sixteenthsInMeasure += pattern.value;
                    }
                    measures.push(measureNotes);
                }
                
                currentPlaybackSequence = newPlaybackSequence;

                context.clear();
                const measuresPerLine = 2; // <-- CORRECCIÓN CLAVE
                const staveWidth = (outputDiv.clientWidth / measuresPerLine) - 15;
                const totalHeight = 150 * Math.ceil(numMeasures / measuresPerLine);
                renderer.resize(outputDiv.clientWidth, totalHeight);

                let staveX = 5;
                let staveY = 20;
                measures.forEach((notes, i) => {
                    if (i > 0 && i % measuresPerLine === 0) {
                        staveX = 5;
                        staveY += 150;
                    }
                    const stave = new Stave(staveX, staveY, staveWidth);
                    if(i === 0) stave.addClef('bass').addTimeSignature('4/4');
                    stave.setContext(context).draw();

                    const beams = Beam.generateBeams(notes, {
                        groups: [new Vex.Flow.Fraction(2, 8)]
                    });
                    Formatter.FormatAndDraw(context, stave, notes);
                    beams.forEach(beam => beam.setContext(context).draw());
                    
                    staveX += stave.getWidth();
                });
            }

            generateBtn.addEventListener('click', () => {
                stopAllSounds();
                generateSheetMusic();
            });

            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    stopAllSounds();
                } else {
                    playSequence();
                }
            });

            bpmSlider.addEventListener('input', (e) => {
                bpm = parseInt(e.target.value, 10);
                bpmValue.innerText = bpm;
                if (isPlaying) {
                    stopAllSounds();
                }
            });

            metronomeToggle.addEventListener('change', (e) => {
                isMetronomeOn = e.target.checked;
            });

            generateSheetMusic();
            preloadSounds();
        });
    </script>
</body>
</html>
