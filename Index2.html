<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Lectura a Primera Vista (Audio Real)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #1a202c;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .at-viewport {
             border-radius: 0.5rem;
        }
        button {
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto p-4 md:p-8">
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800">Lector de Partituras con Sonido Real</h1>
            <p class="text-gray-600 mt-2">Genera 4 compases de notas aleatorias y escúchalas.</p>
        </header>

        <div id="alpha-tab-container"></div>

        <footer class="mt-8 flex flex-wrap justify-center items-center gap-6">
            <button id="generate-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md">
                Generar Partitura
            </button>
            <button id="play-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md" disabled>
                Cargando...
            </button>
            <div class="flex items-center gap-2 text-gray-700">
                <label for="bpm-slider" class="font-medium">BPM:</label>
                <input id="bpm-slider" type="range" min="40" max="220" value="120" class="w-32 cursor-pointer">
                <span id="bpm-value" class="font-bold text-lg w-10 text-left">120</span>
            </div>
        </footer>
    </div>

    <!-- Librería para visuales -->
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.js"></script>
    
    <script>
        window.addEventListener('load', () => {
            if (typeof alphaTab === 'undefined') {
                const container = document.querySelector('#alpha-tab-container');
                container.innerText = "Error: La librería alphaTab no se pudo cargar.";
                return;
            }

            const container = document.querySelector('#alpha-tab-container');
            const generateBtn = document.getElementById('generate-btn');
            const playBtn = document.getElementById('play-btn');
            const bpmSlider = document.getElementById('bpm-slider');
            const bpmValue = document.getElementById('bpm-value');
            
            const notePool = [
                'B0', 'C1', 'C#1', 'Db1', 'D1', 'D#1', 'Eb1', 'E1', 'F1', 'F#1', 'Gb1', 'G1', 'G#1', 'Ab1', 'A1', 'A#1', 'Bb1', 'B1',
                'C2', 'C#2', 'Db2', 'D2', 'D#2', 'Eb2', 'E2', 'F2', 'F#2', 'Gb2', 'G2', 'G#2', 'Ab2', 'A2', 'A#2', 'Bb2', 'B2',
                'C3', 'C#3', 'Db3', 'D3', 'D#3', 'Eb3', 'E3'
            ];
            let api = null;
            let currentNotes = [];
            let bpm = 120;

            let isPlaying = false;
            let scheduledTimeouts = [];
            let currentlyPlayingSound = null;
            
            const audioCache = {};
            const enharmonicMap = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };

            try {
                api = new alphaTab.AlphaTabApi(container, { core: { tex: true } });
            } catch (e) {
                console.error("Error al inicializar alphaTab:", e);
                container.innerText = "Hubo un error al inicializar el renderizador.";
                return;
            }

            function getAudioNoteName(writtenNote) {
                const noteLetter = writtenNote.slice(0, -1);
                const octave = writtenNote.slice(-1);
                const enharmonicEquivalent = enharmonicMap[noteLetter];
                return enharmonicEquivalent ? enharmonicEquivalent + octave : writtenNote;
            }

            function preloadSounds() {
                console.log("--- Iniciando precarga de sonidos ---");
                
                const soundNoteNames = [
                    'B1', 'C2', 'C#2', 'D2', 'D#2', 'E2', 'F2', 'F#2', 'G2', 'G#2', 'A2', 'A#2', 'B2',
                    'C3', 'C#3', 'D3', 'D#3', 'E3', 'F3', 'F#3', 'G3', 'G#3', 'A3', 'A#3', 'B3',
                    'C4', 'C#4', 'D4', 'D#4', 'E4'
                ];

                let soundsLoaded = 0;
                const totalSounds = soundNoteNames.length;

                if (totalSounds === 0) {
                    playBtn.disabled = false;
                    playBtn.innerText = 'Reproducir';
                    return;
                }
                playBtn.innerText = `Cargando 0/${totalSounds}`;

                const onSoundLoad = (fileName) => {
                    soundsLoaded++;
                    console.log(`[${soundsLoaded}/${totalSounds}] ✅ ${fileName} cargado.`);
                    playBtn.innerText = `Cargando ${soundsLoaded}/${totalSounds}`;
                    if (soundsLoaded === totalSounds) {
                        playBtn.disabled = false;
                        playBtn.innerText = 'Reproducir';
                        console.log("--- ¡Precarga de sonidos completada! ---");
                    }
                };

                soundNoteNames.forEach(noteName => {
                    let fileName = noteName.replace('#', 's').toLowerCase() + '.wav';
                    let audioPath = `assets/notas-de-bajo/${fileName}`;
                    
                    const sound = new Audio(audioPath);
                    
                    sound.addEventListener('canplaythrough', () => onSoundLoad(fileName), { once: true });
                    sound.addEventListener('error', () => {
                        console.error(`❌ Error al cargar ${audioPath}.`);
                        onSoundLoad(fileName);
                    }, { once: true });
                    audioCache[noteName] = sound;
                });
            }

            function stopAllSounds() {
                isPlaying = false;
                playBtn.innerText = 'Reproducir';
                if (currentlyPlayingSound) {
                    currentlyPlayingSound.pause();
                    currentlyPlayingSound.currentTime = 0;
                    currentlyPlayingSound = null;
                }
                scheduledTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
                scheduledTimeouts = [];
            }

            function playNotes() {
                if (currentNotes.length === 0) return;

                stopAllSounds();
                isPlaying = true;
                playBtn.innerText = 'Detener';
                const quarterNoteDuration = (60 / bpm) * 1000;
                let accumulatedDelay = 0;

                currentNotes.forEach((noteObject, index) => {
                    const timeoutId = setTimeout(() => {
                        if (currentlyPlayingSound) {
                            currentlyPlayingSound.pause();
                            currentlyPlayingSound.currentTime = 0;
                        }

                        const audioNote = getAudioNoteName(noteObject.note);
                        const noteLetter = audioNote.slice(0, -1);
                        const writtenOctave = parseInt(audioNote.slice(-1), 10);
                        const soundOctave = writtenOctave + 1;
                        const soundNoteName = noteLetter + soundOctave;
                        
                        const sound = audioCache[soundNoteName];
                        if (sound) {
                            sound.currentTime = 0;
                            currentlyPlayingSound = sound;
                            sound.play().catch(e => console.error(`No se pudo reproducir ${sound.src}:`, e));
                        }

                        if (index === currentNotes.length - 1) {
                            const lastNoteDuration = quarterNoteDuration * (4 / noteObject.duration);
                            const finalTimeout = setTimeout(stopAllSounds, lastNoteDuration);
                            scheduledTimeouts.push(finalTimeout);
                        }
                    }, accumulatedDelay);
                    
                    const noteDuration = quarterNoteDuration * (4 / noteObject.duration);
                    accumulatedDelay += noteDuration;
                    scheduledTimeouts.push(timeoutId);
                });
            }

            function generateSheetMusic() {
                if (!api) return;
                
                currentNotes = [];
                let scoreString = '';

                for (let i = 0; i < 4; i++) {
                    let beatsInMeasure = 0;
                    let measureNotes = [];
                    while (beatsInMeasure < 4) {
                        const rand = Math.random();
                        // Decidir aleatoriamente entre negra, corcheas o semicorcheas
                        if (rand < 0.5) { // 50% Negra
                            const randomNote = notePool[Math.floor(Math.random() * notePool.length)];
                            currentNotes.push({ note: randomNote, duration: 4 });
                            measureNotes.push(randomNote + '.4');
                            beatsInMeasure += 1;
                        } else if (rand < 0.85) { // 35% Corcheas
                            const randomNote1 = notePool[Math.floor(Math.random() * notePool.length)];
                            const randomNote2 = notePool[Math.floor(Math.random() * notePool.length)];
                            currentNotes.push({ note: randomNote1, duration: 8 });
                            currentNotes.push({ note: randomNote2, duration: 8 });
                            measureNotes.push(randomNote1 + '.8');
                            measureNotes.push(randomNote2 + '.8');
                            beatsInMeasure += 1;
                        } else { // 15% Semicorcheas
                            for(let j=0; j<4; j++){
                                const randomNote = notePool[Math.floor(Math.random() * notePool.length)];
                                currentNotes.push({ note: randomNote, duration: 16 });
                                measureNotes.push(randomNote + '.16');
                            }
                            beatsInMeasure += 1;
                        }
                    }
                    scoreString += measureNotes.join(' ') + ' | ';
                }

                const score = `\\clef f4 \\ts 4 4 ${scoreString}`;
                api.tex(score);
            }

            generateBtn.addEventListener('click', () => {
                stopAllSounds();
                generateSheetMusic();
            });

            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    stopAllSounds();
                } else {
                    playNotes();
                }
            });

            bpmSlider.addEventListener('input', (e) => {
                bpm = parseInt(e.target.value, 10);
                bpmValue.innerText = bpm;
                if (isPlaying) {
                    stopAllSounds();
                }
            });

            generateSheetMusic();
            preloadSounds();
        });
    </script>
</body>
</html>
